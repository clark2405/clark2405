<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&amp;family=Share+Tech+Mono&amp;display=swap');
      
      .hud-text {
        font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
        fill: #22d3ee;
        font-size: 10px;
        letter-spacing: 1px;
        opacity: 0.7;
      }
      .title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
        font-size: 50px;
        fill: #22d3ee;
        letter-spacing: 8px;
        text-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        animation: glitch 6s infinite;
      }
      .subtitle {
        font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
        fill: #ffffff;
        font-size: 13px;
        letter-spacing: 2px;
        opacity: 0.9;
      }
      .coordinate {
        font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
        fill: #22d3ee;
        font-size: 11px;
        letter-spacing: 1.5px;
        opacity: 0.8;
      }
      .bracket {
        stroke: #22d3ee;
        stroke-width: 1.5;
        opacity: 0.8;
      }
      .grid-line {
        stroke: rgba(34, 211, 238, 0.1);
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }
      
      @keyframes glitch {
        0%, 95%, 100% { transform: translate(0); }
        96% { transform: translate(-2px, 1px) skewX(2deg); }
        97% { transform: translate(2px, -1px) skewX(-2deg); }
        98% { transform: translate(-1px, -2px); }
        99% { transform: translate(1px, 2px); }
      }
    </style>
  </defs>

  <!-- Background HUD Grid lines -->
  <line x1="20" y1="20" x2="780" y2="20" class="grid-line" />
  <line x1="20" y1="180" x2="780" y2="180" class="grid-line" />
  <line x1="80" y1="20" x2="80" y2="180" class="grid-line" />
  <line x1="720" y1="20" x2="720" y2="180" class="grid-line" />

  <!-- Corner Brackets -->
  <!-- Top Left -->
  <path d="M 35 20 H 20 V 35" class="bracket" />
  <!-- Top Right -->
  <path d="M 765 20 H 780 V 35" class="bracket" />
  <!-- Bottom Left -->
  <path d="M 35 180 H 20 V 165" class="bracket" />
  <!-- Bottom Right -->
  <path d="M 765 180 H 780 V 165" class="bracket" />

  <!-- HUD Telemetry Tags -->
  <text x="30" y="38" class="hud-text">SYS.LOC // 10.3157 N 123.8854 E</text>
  <text x="770" y="38" text-anchor="end" class="hud-text">STATUS // ONLINE</text>
  <text x="30" y="168" class="hud-text">CLEARANCE // ECHO-07</text>
  <text x="770" y="168" text-anchor="end" class="hud-text">DES_SYS // CYBER-HUD v4</text>

  <!-- Center Content -->
  <!-- Align items perfectly -->
  <text x="400" y="90" text-anchor="middle" class="title">CLARK JACA</text>
  <text x="400" y="125" text-anchor="middle" class="subtitle">FULL-STACK DEVELOPER &amp; UI/UX CRAFTSPERSON</text>
  <text x="400" y="145" text-anchor="middle" class="coordinate">» Cebu City, PH «</text>
</svg>
